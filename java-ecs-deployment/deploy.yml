name: TeamMart Core CI/CD

on:
  push:
    branches:
      - master


permissions:
  id-token: write    # Needed for OIDC to assume AWS role
  contents: read     # Needed to checkout code

concurrency:
  group: tm-core-${{ github.ref_name }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPO_TM_CORE }}

jobs:
  build-and-push-image:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      registry: ${{ steps.login-ecr.outputs.registry }}
      latest_tag: ${{ steps.latest.outputs.latest_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag (short SHA)
        id: meta
        shell: bash
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Select branch-specific latest tag
        id: latest
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            dev)
              echo "LATEST_TAG=dev-latest" >> "$GITHUB_ENV"
              echo "latest_tag=dev-latest" >> "$GITHUB_OUTPUT"
              ;;
            staging)
              echo "LATEST_TAG=staging-latest" >> "$GITHUB_ENV"
              echo "latest_tag=staging-latest" >> "$GITHUB_OUTPUT"
              ;;
            master)
              echo "LATEST_TAG=prod-latest" >> "$GITHUB_ENV"
              echo "latest_tag=prod-latest" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "LATEST_TAG=unknown" >> "$GITHUB_ENV"
              echo "latest_tag=unknown" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.LATEST_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy-to-prod-ecs:
    name: Deploy to Production (ECS)
    needs: build-and-push-image
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ needs.build-and-push-image.outputs.short_sha }}

    steps:
      - name: Notify Slack - Deployment Started
        run: |
          curl -X POST '${{ secrets.SLACK_WEBHOOK_URL }}' \
            -H 'Content-Type: application/json' \
            -d '{"text":"🚀 *TM-Core Production Deployment Started*\nVersion: `${{ env.IMAGE_TAG }}`\nTriggered by: ${{ github.actor }}"}' \
            || true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download task definition from ECS
        run: |
          aws ecs describe-task-definition \
            --task-definition tm-core-prod-new \
            --query taskDefinition > task-definition.json
          
          echo "✅ Task definition downloaded"
          echo "Current image:"
          cat task-definition.json | jq -r '.containerDefinitions[0].image'

      - name: Update image in task definition
        id: task-def
        run: |
          echo "🔍 Debug Info:"
          echo "  Registry: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "  Repository: ${{ env.ECR_REPOSITORY }}"
          echo "  Short SHA: ${{ env.IMAGE_TAG }}"
          
          NEW_IMAGE="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${{ env.IMAGE_TAG }}"
          
          echo "🔄 Updating image to: $NEW_IMAGE"
          
          if [[ ! "$NEW_IMAGE" =~ ^[0-9]+\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com/.+:.+ ]]; then
            echo "❌ ERROR: Invalid image URL format: $NEW_IMAGE"
            exit 1
          fi
          
          jq --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE | 
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)' \
            task-definition.json > new-task-definition.json
          
          echo "✅ Task definition updated"
          echo ""
          echo "📋 Task Definition Summary:"
          cat new-task-definition.json | jq -r '{
            family: .family,
            cpu: .cpu,
            memory: .memory,
            requiresCompatibilities: .requiresCompatibilities,
            containerName: .containerDefinitions[0].name,
            containerImage: .containerDefinitions[0].image,
            containerMemory: .containerDefinitions[0].memory
          }'

      - name: Register new task definition
        id: register-task
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          
          echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_OUTPUT
          echo "✅ Task definition registered: $TASK_DEF_ARN"

      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service \
            --cluster teammart-cluster \
            --service tm-core-service \
            --task-definition ${{ steps.register-task.outputs.TASK_DEF_ARN }} \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
          
          echo "✅ Service update initiated"

      - name: Wait for service stability
        run: |
          echo "⏳ Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster teammart-cluster \
            --services tm-core-service \
            --region ${{ secrets.AWS_REGION }}
          
          echo "✅ Service is stable"

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "📦 Image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${{ env.IMAGE_TAG }}"
          
          echo ""
          echo "📊 Service Status:"
          aws ecs describe-services \
            --cluster teammart-cluster \
            --services tm-core-service \
            --query 'services[0].[serviceName,runningCount,desiredCount,deployments[0].taskDefinition]' \
            --output table

      - name: Notify Slack - Deployment Succeeded
        if: success()
        run: |
          curl -X POST '${{ secrets.SLACK_WEBHOOK_URL }}' \
            -H 'Content-Type: application/json' \
            -d '{"text":"✅ *TM-Core Production Deployment Succeeded*\nVersion: `${{ env.IMAGE_TAG }}`\nEnvironment: Production (ECS)"}' \
            || true

      - name: Notify Slack - Deployment Failed
        if: failure()
        run: |
          curl -X POST '${{ secrets.SLACK_WEBHOOK_URL }}' \
            -H 'Content-Type: application/json' \
            -d '{"text":"❌ *TM-Core Production Deployment Failed*\nVersion: `${{ env.IMAGE_TAG }}`\nEnvironment: Production (ECS)\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"}' \
            || true